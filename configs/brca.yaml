# BRCA — Breast Invasive Carcinoma
# Encoder: UNI (1024-dim patch embeddings)
# Patients (EC2 full run): 1,123

cancer: brca

# ── Data paths ────────────────────────────────────────────────────────────────
uni_dir: /home/ubuntu/tangle_data/brca/brca
gene_csv_paths:
  - /home/ubuntu/tcga_brca_data/histology_gene_train.csv
  - /home/ubuntu/tcga_brca_data/histology_gene_val.csv
subtype_csv_paths: []
save_dir: results_singlehead/brca

# ── Model ─────────────────────────────────────────────────────────────────────
image_dim:   1024    # UNI
fusion_type: attention
dropout:     0.3

# ── Gene preprocessing ────────────────────────────────────────────────────────
n_top_genes: 20000   # keep top-20k by variance after log1p

# ── Training ──────────────────────────────────────────────────────────────────
epochs:      200
batch_size:  32
lr:          1.0e-3
weight_decay: 1.0e-4
val_fraction:  0.15
test_fraction: 0.10
seed:        42

# ── Loss weights ──────────────────────────────────────────────────────────────
loss_weights:
  survival: 1.0
